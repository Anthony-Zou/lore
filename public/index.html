<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HN Dashboard</title>
<style>
:root {
  color-scheme: light;
  --orange:       #ff6600;
  --orange-light: #fff4ed;
  --orange-mid:   #ffe8d0;
  --bg:           #f6f6ef;
  --card:         #ffffff;
  --border:       #e8e8e0;
  --text:         #1a1a1a;
  --muted:        #828282;
  --link:         #2563eb;
  --tag-bg:       #f0f0eb;
  --sidebar-bg:   #fafaf7;
  --radius:       10px;
  --shadow:       0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ── HEADER ── */
header{background:var(--orange);height:48px;padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(255,102,0,.25);}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;}
.logo-box{width:26px;height:26px;background:#fff;color:var(--orange);font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:4px;letter-spacing:-1px;}
.search-wrap{flex:1;max-width:360px;position:relative;}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:none;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:13px;outline:none;transition:background .2s;}
.search-wrap input::placeholder{color:rgba(255,255,255,.7);}
.search-wrap input:focus{background:rgba(255,255,255,.3);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.75);pointer-events:none;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.ts{font-size:11px;color:rgba(255,255,255,.7);}
.btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;padding:5px 11px;border-radius:14px;font-size:12px;display:flex;align-items:center;gap:4px;transition:background .2s;}
.btn-hdr:hover{background:rgba(255,255,255,.35);}
.spinning .ri{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:190px 1fr 300px;min-height:calc(100vh - 48px);}

/* ── SIDEBAR ── */
aside{background:var(--sidebar-bg);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:48px;height:calc(100vh - 48px);overflow-y:auto;}
.nav-sec{margin-bottom:6px;}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:0 14px 5px;}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13px;color:var(--text);transition:background .15s;}
.nav-btn:hover{background:var(--orange-light);}
.nav-btn.active{background:var(--orange-light);color:var(--orange);font-weight:600;border-right:3px solid var(--orange);}
.nav-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.divider{height:1px;background:var(--border);margin:8px 14px;}
.tag-list{padding:0 14px;display:flex;flex-direction:column;gap:3px;}
.tag-btn{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;border:none;background:none;width:100%;text-align:left;color:var(--text);transition:background .15s;}
.tag-btn:hover{background:var(--orange-light);}
.tag-btn.active{background:var(--orange-light);color:var(--orange);font-weight:600;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Wiki nav item */
.wiki-count{margin-left:auto;font-size:11px;color:var(--muted);}

/* ── MAIN ── */
main{padding:18px;overflow-y:auto;min-width:0;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:17px;font-weight:700;}
.sec-sub{font-size:11px;color:var(--muted);}

/* stats */
.stats{display:flex;gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;text-align:center;}
.stat-v{font-size:20px;font-weight:800;color:var(--orange);}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* story list */
.story-list{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:12px;cursor:pointer;transition:box-shadow .2s,border-color .2s;}
.card:hover{box-shadow:var(--shadow);border-color:#d0d0c8;}
.card.selected{border-color:var(--orange);background:var(--orange-light);}
.card.saving{opacity:.6;pointer-events:none;}
.rank{font-size:18px;font-weight:900;color:#ddd;width:24px;text-align:right;flex-shrink:0;line-height:1.3;}
.body{flex:1;min-width:0;}
.ttl{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;word-break:break-word;}
.ttl a{color:inherit;text-decoration:none;}
.ttl a:hover{color:var(--orange);}
.domain{font-size:11px;color:var(--muted);background:var(--tag-bg);padding:1px 6px;border-radius:10px;display:inline-block;margin-bottom:4px;}
.meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.score{background:linear-gradient(135deg,#ff6600,#ff8c42);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;}
.mi{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.btn-comment{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:12px;padding:2px 8px;cursor:pointer;transition:all .15s;}
.btn-comment:hover{background:var(--orange-light);border-color:var(--orange);color:var(--orange);}
.btn-save{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:12px;padding:2px 8px;cursor:pointer;transition:all .15s;margin-left:4px;}
.btn-save:hover{background:#fffbea;border-color:#f59e0b;color:#d97706;}
.btn-save.saved{background:#fffbea;border-color:#f59e0b;color:#d97706;cursor:default;}
.type-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
.ask{background:#e8f4fd;color:#1a73b0;}
.show{background:#e8f9f0;color:#1a7a3a;}
.job{background:#fdf6e8;color:#8a6100;}

/* skeleton */
.skel{background:linear-gradient(90deg,#f0f0eb 25%,#e8e8e2 50%,#f0f0eb 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:12px;}

/* load more */
.btn-more{display:block;width:100%;padding:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--muted);font-size:13px;transition:all .2s;margin-top:7px;}
.btn-more:hover{background:var(--orange-light);border-color:var(--orange);color:var(--orange);}

/* empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:8px;}

/* ── COMMENTS / WIKI PANEL ── */
.right-panel{background:var(--sidebar-bg);border-left:1px solid var(--border);position:sticky;top:48px;height:calc(100vh - 48px);overflow:hidden;display:flex;flex-direction:column;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.panel-body{flex:1;overflow-y:auto;padding:12px;}

/* comments */
.cmt-hdr{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text);}
.cmt-story-title{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.4;}
.cmt{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;}
.cmt-author{font-size:11px;font-weight:700;color:var(--orange);}
.cmt-time{font-size:10px;color:var(--muted);margin-left:5px;font-weight:400;}
.cmt-text{font-size:12px;color:var(--text);line-height:1.6;margin-top:4px;word-break:break-word;}
.cmt-text a{color:var(--link);}
.cmt-text code{background:#f5f5f0;padding:1px 4px;border-radius:3px;font-size:11px;font-family:'SF Mono',Monaco,monospace;}
.cmt-text p{margin-bottom:5px;}
.cmt-text p:last-child{margin-bottom:0;}
.cmt-replies{font-size:11px;color:var(--muted);margin-top:4px;}
.btn-hn{display:block;width:100%;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;color:var(--orange);font-size:12px;font-weight:600;text-decoration:none;margin-top:8px;transition:background .15s;}
.btn-hn:hover{background:var(--orange-light);}

/* wiki panel */
.wiki-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.wiki-entry:hover{border-color:var(--orange);}
.wiki-entry-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4;}
.wiki-entry-meta{font-size:11px;color:var(--muted);}
.wiki-tag{display:inline-block;background:var(--tag-bg);border-radius:8px;padding:1px 6px;font-size:10px;margin-right:3px;color:var(--muted);}
.wiki-saving{background:var(--orange-light);border:1px dashed var(--orange);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:12px;color:var(--orange);display:flex;align-items:center;gap:7px;}
.pulse{animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* bloomberg panel */
--bb: #0a5c8f;
.bb-card{background:var(--card);border:1px solid var(--border);border-left:3px solid #0a5c8f;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s;}
.bb-card:hover{box-shadow:var(--shadow);}
.bb-card.active{border-left-color:var(--orange);background:var(--orange-light);}
.bb-date{font-size:11px;font-weight:700;color:#0a5c8f;margin-bottom:3px;}
.bb-topcall{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:4px;}
.bb-meta{font-size:10px;color:var(--muted);}
.bb-section{margin-bottom:14px;}
.bb-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.bb-section-body{font-size:12px;color:var(--text);line-height:1.6;}
.bb-idea{background:#f0f7ff;border:1px solid #c7dff7;border-radius:7px;padding:8px 10px;margin-bottom:6px;}
.bb-idea-title{font-size:12px;font-weight:600;color:#0a5c8f;margin-bottom:4px;}
.bb-idea-row{font-size:11px;color:var(--text);margin-bottom:2px;}
.bb-idea-row span{color:var(--muted);margin-right:4px;}
.bb-back{font-size:11px;color:var(--orange);cursor:pointer;background:none;border:none;padding:0;margin-bottom:10px;display:flex;align-items:center;gap:4px;}
.bb-back:hover{text-decoration:underline;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">HN</div>
    Dashboard
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Search stories, authors…" />
  </div>
  <div class="hdr-right">
    <span class="ts" id="lastUpdated">Loading…</span>
    <button class="btn-hdr" id="refreshBtn" onclick="refreshAll()">
      <span class="ri">↻</span> Refresh
    </button>
  </div>
</header>

<div class="layout">

<!-- ── SIDEBAR ── -->
<aside>
  <div class="nav-sec">
    <div class="nav-label">Feed</div>
    <button class="nav-btn active" onclick="switchType('top',this)">🔥 Top Stories <span class="nav-badge" id="badge-top">—</span></button>
    <button class="nav-btn" onclick="switchType('new',this)">✨ New</button>
    <button class="nav-btn" onclick="switchType('ask',this)">❓ Ask HN</button>
    <button class="nav-btn" onclick="switchType('show',this)">🚀 Show HN</button>
    <button class="nav-btn" onclick="switchType('job',this)">💼 Jobs</button>
  </div>
  <div class="divider"></div>
  <div class="nav-sec">
    <div class="nav-label">Wiki</div>
    <button class="nav-btn" onclick="showWikiPanel()">📚 Saved <span class="wiki-count" id="wikiCount">0</span></button>
  </div>
  <div class="divider"></div>
  <div class="nav-sec">
    <div class="nav-label">Topics</div>
    <div class="tag-list">
      <button class="tag-btn active" onclick="filterTag('',this)"><span class="dot" style="background:#888"></span>All</button>
      <button class="tag-btn" onclick="filterTag('ai-ml',this)"><span class="dot" style="background:#8b5cf6"></span>AI / ML</button>
      <button class="tag-btn" onclick="filterTag('startup',this)"><span class="dot" style="background:#f59e0b"></span>Startup</button>
      <button class="tag-btn" onclick="filterTag('programming',this)"><span class="dot" style="background:#3b82f6"></span>Programming</button>
      <button class="tag-btn" onclick="filterTag('security',this)"><span class="dot" style="background:#ef4444"></span>Security</button>
      <button class="tag-btn" onclick="filterTag('science',this)"><span class="dot" style="background:#10b981"></span>Science</button>
      <button class="tag-btn" onclick="filterTag('business',this)"><span class="dot" style="background:#f97316"></span>Business</button>
    </div>
  </div>
</aside>

<!-- ── MAIN ── -->
<main id="mainContent">
  <div class="sec-hdr">
    <div>
      <div class="sec-title" id="secTitle">🔥 Top Stories</div>
      <div class="sec-sub" id="secSub">Top Stories on Hacker News</div>
    </div>
  </div>
  <div class="stats" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-v" id="statCount">—</div><div class="stat-l">Stories</div></div>
    <div class="stat"><div class="stat-v" id="statAvg">—</div><div class="stat-l">Avg Score</div></div>
    <div class="stat"><div class="stat-v" id="statTop">—</div><div class="stat-l">Top Score</div></div>
  </div>
  <div class="story-list" id="storyList"></div>
  <button class="btn-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more ↓</button>
</main>

<!-- ── RIGHT PANEL ── -->
<div class="right-panel">
  <div class="panel-tabs">
    <button class="tab active" id="tabComments" onclick="switchTab('comments')">💬 Comments</button>
    <button class="tab" id="tabWiki" onclick="switchTab('wiki')">📚 Wiki</button>
    <button class="tab" id="tabBloomberg" onclick="switchTab('bloomberg')">📊 BB</button>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="empty"><div class="empty-icon">👈</div><p>Click a story to see comments</p></div>
  </div>
</div>

</div><!-- layout -->

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allStories = [], displayedStories = [];
let currentType = 'top', currentTag = '', searchQuery = '';
let currentPage = 0;
const PAGE_SIZE = 20;
let activeTab = 'comments';
let savedIds = new Set();   // story ids saved to wiki
let savingIds = new Set();  // currently saving

// ── Helpers ──────────────────────────────────────────────────────────────────
function timeAgo(unix) {
  const d = Math.floor(Date.now() / 1000) - unix;
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}
function domain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return ''; }
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tag keyword match (client-side) ─────────────────────────────────────────
const TAG_KW = {
  'ai-ml':       ['ai','gpt','llm','openai','anthropic','claude','gemini','neural','machine learning','deep learning','language model','mistral','diffusion','transformer'],
  startup:       ['startup','yc','y combinator','founder','series a','series b','venture','saas','bootstrapped'],
  programming:   ['javascript','python','rust','golang','typescript','react','linux','open source','git','api','framework','compiler','database','sql','kubernetes','docker','programming','developer'],
  security:      ['security','vulnerability','exploit','breach','malware','ransomware','zero-day','cve','privacy','encryption'],
  science:       ['research','study','physics','biology','chemistry','space','nasa','climate','quantum','genomics'],
  business:      ['acquisition','ipo','revenue','profit','layoffs','economy','market','stock','apple','google','microsoft','meta','amazon'],
};
function matchTag(title, tag) {
  if (!tag) return true;
  const t = title.toLowerCase();
  return (TAG_KW[tag] || []).some(k => t.includes(k));
}

// ── Fetch stories from backend ───────────────────────────────────────────────
async function loadStories() {
  showSkeletons();
  try {
    const r = await fetch(`/api/stories/${currentType}?limit=100`);
    const { stories } = await r.json();
    allStories = stories || [];
    document.getElementById('badge-top').textContent = allStories.length;
    applyFilters();
    updateStats();
    document.getElementById('lastUpdated').textContent =
      `Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
  } catch (e) {
    document.getElementById('storyList').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load stories.<br>Is the server running?</p></div>`;
  }
}

function applyFilters() {
  let f = allStories;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(s => s.title.toLowerCase().includes(q) || (s.by||'').toLowerCase().includes(q));
  }
  if (currentTag) f = f.filter(s => matchTag(s.title, currentTag));
  displayedStories = f;
  currentPage = 0;
  renderStories(false);
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderStories(append) {
  const list = document.getElementById('storyList');
  const start = append ? currentPage * PAGE_SIZE : 0;
  const end   = (currentPage + 1) * PAGE_SIZE;
  const slice = displayedStories.slice(start, end);

  if (!append) list.innerHTML = '';

  if (!slice.length && !append) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No stories found</p></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  slice.forEach((s, i) => {
    const rank  = start + i + 1;
    const dm    = domain(s.url || '');
    const type  = s.title.startsWith('Ask HN:') ? 'ask' : s.title.startsWith('Show HN:') ? 'show' : s.type === 'job' ? 'job' : '';
    const typeBadge = type ? `<span class="type-badge ${type}">${type}</span> ` : '';
    const isSaved   = savedIds.has(s.id);
    const isSaving  = savingIds.has(s.id);

    const card = document.createElement('div');
    card.className = 'card' + (isSaving ? ' saving' : '');
    card.dataset.id = s.id;
    card.innerHTML = `
      <div class="rank">${rank}</div>
      <div class="body">
        <div class="ttl">${typeBadge}<a href="${escHtml(s.url||`https://news.ycombinator.com/item?id=${s.id}`)}" target="_blank" onclick="event.stopPropagation()">${escHtml(s.title)}</a></div>
        ${dm ? `<span class="domain">${escHtml(dm)}</span>` : ''}
        <div class="meta">
          <span class="score">▲ ${s.score||0}</span>
          <span class="mi">👤 ${escHtml(s.by||'anon')}</span>
          <span class="mi">⏱ ${s.time ? timeAgo(s.time) : '—'}</span>
          <button class="btn-comment" onclick="loadComments(${s.id},'${escHtml(s.title).replace(/'/g,"\\'")}');event.stopPropagation()">
            💬 ${s.descendants||0}
          </button>
          <button class="btn-save ${isSaved?'saved':''}" onclick="saveToWiki(${s.id},this);event.stopPropagation()">
            ${isSaved ? '⭐ Saved' : isSaving ? '⏳ Saving…' : '☆ Save'}
          </button>
        </div>
      </div>`;

    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      loadComments(s.id, s.title);
    });

    list.appendChild(card);
  });

  document.getElementById('loadMoreBtn').style.display =
    end < displayedStories.length ? 'block' : 'none';
}

function loadMore() {
  currentPage++;
  renderStories(true);
}

function showSkeletons() {
  document.getElementById('storyList').innerHTML =
    Array(8).fill(0).map(() => `
      <div class="skel-card">
        <div class="skel" style="width:24px;height:22px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skel" style="height:14px;width:78%;margin-bottom:8px"></div>
          <div class="skel" style="height:11px;width:45%"></div>
        </div>
      </div>`).join('');
  document.getElementById('loadMoreBtn').style.display = 'none';
}

function updateStats() {
  document.getElementById('statsBar').style.display = 'flex';
  const scores = allStories.map(s => s.score || 0);
  document.getElementById('statCount').textContent = allStories.length;
  document.getElementById('statAvg').textContent   = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  document.getElementById('statTop').textContent   = scores.length ? Math.max(...scores) : 0;
}

// ── Type / tag switching ─────────────────────────────────────────────────────
const TYPE_LABELS = {
  top:  ['🔥 Top Stories',  'Top Stories on Hacker News'],
  new:  ['✨ New',           'New Stories on Hacker News'],
  ask:  ['❓ Ask HN',        'Community Questions'],
  show: ['🚀 Show HN',       'Community Showcases'],
  job:  ['💼 Jobs',          'Hiring on Hacker News'],
};

function switchType(type, btn) {
  currentType = type; currentTag = ''; searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tag-btn[onclick*="\'\'"]').classList.add('active');
  const [title, sub] = TYPE_LABELS[type] || ['Stories',''];
  document.getElementById('secTitle').textContent = title;
  document.getElementById('secSub').textContent   = sub;
  loadStories();
}

function filterTag(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadStories().finally(() => btn.classList.remove('spinning'));
}

// ── Search ───────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value.trim(); applyFilters(); }, 280);
});

// ── Comments ─────────────────────────────────────────────────────────────────
async function loadComments(storyId, title) {
  switchTab('comments');
  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div class="cmt-hdr">Comments</div>
    <div class="cmt-story-title">${escHtml(title)}</div>
    <div class="empty"><div class="empty-icon pulse">⏳</div><p>Loading…</p></div>`;

  try {
    const r = await fetch(`/api/comments/${storyId}?limit=15`);
    const { comments } = await r.json();

    body.innerHTML = `
      <div class="cmt-hdr">Comments</div>
      <div class="cmt-story-title">${escHtml(title)}</div>`;

    if (!comments || !comments.length) {
      body.innerHTML += `<div class="empty"><div class="empty-icon">🤫</div><p>No comments yet</p></div>`;
    } else {
      comments.forEach(c => {
        const div = document.createElement('div');
        div.className = 'cmt';
        const safe = (c.text||'').replace(/<script[^>]*>.*?<\/script>/gi,'').replace(/on\w+="[^"]*"/g,'');
        div.innerHTML = `
          <div><span class="cmt-author">${escHtml(c.by||'anon')}</span><span class="cmt-time">${c.time?timeAgo(c.time):''}</span></div>
          <div class="cmt-text">${safe}</div>
          ${c.kids&&c.kids.length ? `<div class="cmt-replies">↳ ${c.kids.length} replies</div>` : ''}`;
        body.appendChild(div);
      });
    }

    const a = document.createElement('a');
    a.href = `https://news.ycombinator.com/item?id=${storyId}`;
    a.target = '_blank';
    a.className = 'btn-hn';
    a.textContent = 'View full discussion on HN →';
    body.appendChild(a);

  } catch {
    body.innerHTML += `<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load</p></div>`;
  }
}

// ── Wiki ──────────────────────────────────────────────────────────────────────
async function saveToWiki(storyId, btn) {
  if (savedIds.has(storyId) || savingIds.has(storyId)) return;
  savingIds.add(storyId);
  btn.textContent = '⏳ Saving…';
  btn.closest('.card').classList.add('saving');

  try {
    const r = await fetch('/api/wiki/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ storyId }),
    });
    const result = await r.json();
    if (result.ok) {
      savedIds.add(storyId);
      btn.textContent = '⭐ Saved';
      btn.classList.add('saved');
      btn.closest('.card').classList.remove('saving');
      refreshWikiList();
    } else {
      btn.textContent = '❌ Failed';
      btn.closest('.card').classList.remove('saving');
    }
  } catch {
    btn.textContent = '❌ Error';
    btn.closest('.card').classList.remove('saving');
  }
  savingIds.delete(storyId);
}

async function refreshWikiList() {
  try {
    const r = await fetch('/api/wiki/list');
    const { entries, count } = await r.json();
    document.getElementById('wikiCount').textContent = count || 0;

    // Update savedIds
    entries.forEach(e => {
      const m = e.id.match(/hn-(\d+)/);
      if (m) savedIds.add(parseInt(m[1]));
    });

    if (activeTab === 'wiki') renderWikiPanel(entries);
  } catch {}
}

function renderWikiPanel(entries) {
  const body = document.getElementById('panelBody');
  body.innerHTML = `<div class="cmt-hdr">📚 Saved to Wiki (${entries.length})</div>`;

  if (!entries.length) {
    body.innerHTML += `<div class="empty"><div class="empty-icon">📭</div><p>No saved articles yet.<br>Click ☆ Save on any story.</p></div>`;
    return;
  }

  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'wiki-entry';
    const tags = (e.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    div.innerHTML = `
      <div class="wiki-entry-title">${escHtml(e.title || e.id)}</div>
      <div class="wiki-entry-meta">
        ${tags.map(t => `<span class="wiki-tag">${escHtml(t)}</span>`).join('')}
        <span style="margin-left:4px">${escHtml(e.savedAt || '')}</span>
      </div>`;
    body.appendChild(div);
  });
}

function showWikiPanel() {
  switchTab('wiki');
  refreshWikiList();
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabComments').classList.toggle('active', tab === 'comments');
  document.getElementById('tabWiki').classList.toggle('active',     tab === 'wiki');
  document.getElementById('tabBloomberg').classList.toggle('active',tab === 'bloomberg');

  if (tab === 'wiki') {
    fetch('/api/wiki/list').then(r=>r.json()).then(({entries})=>renderWikiPanel(entries||[])).catch(()=>{});
  } else if (tab === 'bloomberg') {
    loadBloombergList();
  }
}

// ── Bloomberg ─────────────────────────────────────────────────────────────────
let bbReports = [];
let bbSelectedSlug = null;

async function loadBloombergList() {
  try {
    const r = await fetch('/api/bloomberg/list');
    const { reports } = await r.json();
    bbReports = reports || [];
    if (activeTab === 'bloomberg') renderBloombergList();
  } catch {}
}

function renderBloombergList() {
  const body = document.getElementById('panelBody');
  body.innerHTML = `<div class="cmt-hdr">📊 Bloomberg Daily Reports (${bbReports.length})</div>`;

  if (!bbReports.length) {
    body.innerHTML += `<div class="empty"><div class="empty-icon">📭</div><p>No Bloomberg reports yet.<br>Drop <code>bloomberg-YYYY-MM-DD.md</code><br>into your daily-reports folder.</p></div>`;
    return;
  }

  bbReports.forEach(r => {
    const div = document.createElement('div');
    div.className = 'bb-card' + (r.slug === bbSelectedSlug ? ' active' : '');
    div.innerHTML = `
      <div class="bb-date">📊 ${r.date}</div>
      <div class="bb-topcall">${escHtml(r.topCall || '—')}</div>`;
    div.addEventListener('click', () => loadBloombergReport(r.slug));
    body.appendChild(div);
  });
}

async function loadBloombergReport(slug) {
  bbSelectedSlug = slug;
  const body = document.getElementById('panelBody');
  body.innerHTML = `<div class="empty"><div class="empty-icon pulse">⏳</div><p>Loading report…</p></div>`;

  try {
    const r = await fetch(`/api/bloomberg/report/${slug}`);
    const md = await r.text();
    renderBloombergReport(slug, md);
  } catch {
    body.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load</p></div>`;
  }
}

function renderBloombergReport(slug, md) {
  const body = document.getElementById('panelBody');
  const dateMatch = slug.match(/bloomberg-(\d{4}-\d{2}-\d{2})/);
  const date = dateMatch ? dateMatch[1] : slug;

  // Parse sections from markdown
  function getSection(heading) {
    const re = new RegExp(`## ${heading.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\s*\\n([\\s\\S]*?)(?=\\n## |$)`);
    const m = md.match(re);
    return m ? m[1].trim() : '';
  }

  const topCall  = getSection('🔝 Top Call');
  const strategy = getSection('⚡ Strategy Summary');
  const signals  = getSection('⚠️ Position Signals');

  // Parse trade ideas
  const ideasSection = getSection('💡 Trade Ideas');
  const ideaBlocks = ideasSection.split(/\n####\s+/).filter(Boolean);
  const ideas = ideaBlocks.map(b => {
    const title     = b.split('\n')[0].trim();
    const direction = (b.match(/\*\*Direction\*\*[：:]\s*(.+)/) || [])[1]?.trim() || '';
    const target    = (b.match(/\*\*Target\*\*[：:]\s*(.+)/) || [])[1]?.trim() || '';
    const logic     = (b.match(/\*\*Logic\*\*[：:]\s*([\s\S]*?)(?=\n-\s*\*\*|$)/) || [])[1]?.trim().slice(0,200) || '';
    const catalyst  = (b.match(/\*\*Catalyst\*\*[：:]\s*(.+)/) || [])[1]?.trim() || '';
    const risk      = (b.match(/\*\*Risk\*\*[：:]\s*(.+)/) || [])[1]?.trim() || '';
    return { title, direction, target, logic, catalyst, risk };
  }).filter(i => i.title);

  body.innerHTML = `
    <button class="bb-back" onclick="renderBloombergList()">← Back to reports</button>
    <div class="cmt-hdr">📊 Bloomberg — ${date}</div>

    <div class="bb-section">
      <div class="bb-section-title">🔝 Top Call</div>
      <div class="bb-section-body">${escHtml(topCall).replace(/\n/g,'<br>')}</div>
    </div>

    <div class="bb-section">
      <div class="bb-section-title">💡 Trade Ideas (${ideas.length})</div>
      ${ideas.map(i => `
        <div class="bb-idea">
          <div class="bb-idea-title">${escHtml(i.title)}</div>
          ${i.direction ? `<div class="bb-idea-row"><span>Dir:</span>${escHtml(i.direction)}</div>` : ''}
          ${i.target    ? `<div class="bb-idea-row"><span>Target:</span>${escHtml(i.target)}</div>` : ''}
          ${i.logic     ? `<div class="bb-idea-row"><span>Logic:</span>${escHtml(i.logic)}…</div>` : ''}
          ${i.catalyst  ? `<div class="bb-idea-row"><span>Catalyst:</span>${escHtml(i.catalyst)}</div>` : ''}
          ${i.risk      ? `<div class="bb-idea-row"><span>Risk:</span>${escHtml(i.risk)}</div>` : ''}
        </div>`).join('') || '<div class="bb-section-body">—</div>'}
    </div>

    <div class="bb-section">
      <div class="bb-section-title">⚠️ Position Signals</div>
      <div class="bb-section-body">${escHtml(signals).replace(/\n/g,'<br>')}</div>
    </div>

    <div class="bb-section">
      <div class="bb-section-title">⚡ Strategy Summary</div>
      <div class="bb-section-body">${escHtml(strategy).replace(/\n/g,'<br>')}</div>
    </div>`;
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/wiki/events');
  es.addEventListener('wiki:saved', e => {
    const { id, title, tags, savedAt } = JSON.parse(e.data);
    savedIds.add(id);
    refreshWikiList();
    // Update save button if visible
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      const btn = card.querySelector('.btn-save');
      if (btn) { btn.textContent = '⭐ Saved'; btn.classList.add('saved'); }
      card.classList.remove('saving');
    }
  });
  es.addEventListener('bloomberg:saved', e => {
    loadBloombergList(); // refresh list when new report ingested
  });

  es.addEventListener('wiki:error', e => {
    const { id } = JSON.parse(e.data);
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      const btn = card.querySelector('.btn-save');
      if (btn) btn.textContent = '❌ Error';
      card.classList.remove('saving');
    }
  });
  es.onerror = () => setTimeout(connectSSE, 5000); // reconnect
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadStories();
refreshWikiList();
loadBloombergList();
connectSSE();
setInterval(loadStories, 5 * 60 * 1000);          // HN auto-refresh every 5 min
setInterval(loadBloombergList, 10 * 60 * 1000);   // Bloomberg check every 10 min
</script>
